version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: xdr-postgres
    environment:
      POSTGRES_USER: xdr
      POSTGRES_PASSWORD: xdr_secure_password_change_me
      POSTGRES_DB: xdrdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xdr"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xdr-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: xdr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xdr-network

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    container_name: xdr-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xdr-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xdr-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://xdr:xdr_secure_password_change_me@postgres:5432/xdrdb
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_HOST: http://elasticsearch:9200
      SECRET_KEY: your-secret-key-change-this-in-production
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - xdr-network
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xdr-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - xdr-network
    command: npm start

  # XDR Agent (optional)
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: xdr-agent
    environment:
      SERVER_IP: backend
      SERVER_PORT: 5005
      LOG_FILE: /var/log/auth.log
    depends_on:
      - backend
    volumes:
      - /var/log/auth.log:/var/log/auth.log:ro
    networks:
      - xdr-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  xdr-network:
    driver: bridge
